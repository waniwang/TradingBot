environment: paper             # paper | live

alpaca:
  api_key: YOUR_ALPACA_API_KEY
  secret_key: YOUR_ALPACA_SECRET_KEY
  # paper=True when environment=paper, paper=False when environment=live
  # Get keys at: https://alpaca.markets → paper account dashboard
  # Real keys live in env vars (ALPACA_API_KEY / ALPACA_SECRET_KEY) — see api/deps.py,
  # which prefers env over config.yaml. Do NOT paste real keys here.

risk:
  risk_per_trade_pct: 1.0      # % of portfolio risked per trade
  max_positions: 10            # max concurrent open positions
  max_position_pct: 15.0       # max single position as % of portfolio notional
  daily_loss_limit_pct: 3.0    # halt day if daily loss exceeds this %
  weekly_loss_limit_pct: 5.0   # halt week if weekly loss exceeds this %

strategies:
  enabled:                                   # which setups to scan & trade
    # - episodic_pivot                       # disabled — focus on EP swing strategies
    - ep_earnings
    - ep_news
    # - breakout                             # disabled — focus on EP swing strategies
    # - parabolic_short                      # disabled — negative expectancy in backtests

signals:
  # --- Shared ---
  orh_minutes: 5                           # opening range duration in minutes
  atr_period: 14                           # ATR lookback period for all ATR calculations

  # --- Episodic Pivot (EP) ---
  ep_min_gap_pct: 10.0                     # min overnight gap % to qualify (e.g. earnings catalyst)
  ep_volume_multiplier: 2.0               # min RVOL vs 20d avg (time-of-day normalized)
  ep_max_extension_pct: 5.0              # max % above ORH before skipping (anti-chase guard)

  # --- EP Earnings (EOD scanner, runs at 3:00 PM ET) ---
  ep_earnings_min_gap_pct: 8.0                    # gap% = (Open - prevClose) / prevClose * 100
  ep_earnings_min_price: 3.0                      # prev close > $3
  ep_earnings_min_market_cap: 800_000_000         # $800M minimum market cap
  ep_earnings_require_earnings: true              # require earnings on gap day
  ep_earnings_require_open_above_prev_high: true  # today's open > yesterday's high
  ep_earnings_require_above_200d_sma: true        # today's open > 200-day SMA
  ep_earnings_min_rvol: 1.0                       # today's vol / 14d avg daily vol >= 1.0
  ep_earnings_stop_loss_pct: 7.0                  # stop loss at -7% from entry
  ep_earnings_max_hold_days: 50                   # exit after 50 calendar days max
  # Strategy A (tight filters)
  ep_earnings_a_min_close_in_range: 50.0          # close in top half of day's range
  ep_earnings_a_max_downside_from_open: 3.0       # max dip below open on gap day
  # prev_10d filter removed 2026-04-21 — Spikeet column unreliable, full backtest shows no edge loss. See strategy.py::evaluate_strategy_a.
  # ep_earnings_a_prev_10d_min: -30.0
  # ep_earnings_a_prev_10d_max: -10.0
  # Strategy B (relaxed filters)
  ep_earnings_b_min_close_in_range: 50.0          # close in top half of day's range
  ep_earnings_b_atr_pct_min: 2.0                  # ATR% floor
  ep_earnings_b_atr_pct_max: 5.0                  # ATR% ceiling
  # ep_earnings_b_prev_10d_max: -10.0             # removed 2026-04-21 (see A)
  # Strategy C (day-2 confirmation)
  ep_earnings_c_stop_loss_pct: 7.0                 # stop loss at -7% from entry
  # ep_earnings_c_prev_10d_max: -10.0             # removed 2026-04-21 — C now unconditional on gap day, gated by day-2 confirm
  ep_earnings_c_max_hold_days: 20                  # shorter hold: 20 days (vs 50 for A/B)
  ep_earnings_c_day2_confirm: true                 # only enter if 1D return > 0

  # --- EP execute-time price refresh (shared by ep_earnings + ep_news) ---
  # Scanner captures price at 3:00-3:05 PM; job_execute fires 3:50-3:59. On
  # running names the scanner mark is stale. These knobs let the bot fetch a
  # live mid at execute time and adjust entry + stop before placing the order.
  # Guards protect against wide/broken quotes (today's MCRI: 28% spread).
  # See core.execution.resolve_execution_price.
  ep_execute_refresh_price: true                   # false → fall back to scanner price (legacy behavior)
  ep_execute_max_price_bump_pct: 3.0               # skip if live mid > scan * (1 + this%)
  ep_execute_max_spread_pct: 3.0                   # skip if (ask-bid)/mid > this% (quote too wide)

  # --- EP News (EOD scanner, runs at 3:00 PM ET) ---
  ep_news_min_gap_pct: 8.0                         # gap% = (Open - prevClose) / prevClose * 100
  ep_news_min_price: 3.0                           # prev close > $3
  ep_news_min_market_cap: 1_000_000_000            # $1B minimum market cap (higher than earnings)
  ep_news_exclude_earnings: true                   # skip stocks with earnings today (handled by ep_earnings)
  ep_news_require_open_above_prev_high: true       # today's open > yesterday's high
  ep_news_require_above_200d_sma: true             # today's open > 200-day SMA
  ep_news_min_rvol: 1.0                            # today's vol / 14d avg daily vol >= 1.0
  ep_news_max_hold_days: 50                        # exit after 50 trading days max
  # Strategy A (NEWS-Tight): -7% stop
  ep_news_a_stop_loss_pct: 7.0
  ep_news_a_chg_open_min: 2.0                      # CHG-OPEN% > 2%
  ep_news_a_chg_open_max: 10.0                     # CHG-OPEN% <= 10%
  ep_news_a_min_close_in_range: 50.0               # closed in top half of day's range
  ep_news_a_max_downside_from_open: 3.0            # max dip below open
  # ep_news_a_prev_10d_max: -20.0                  # removed 2026-04-21 — Spikeet column unreliable, full backtest shows PF barely changes. See strategy.py.
  ep_news_a_atr_pct_min: 3.0                       # ATR% floor
  ep_news_a_atr_pct_max: 7.0                       # ATR% ceiling
  ep_news_a_max_volume_m: 3.0                      # volume < 3M shares
  # Strategy B (NEWS-Relaxed): -10% stop
  ep_news_b_stop_loss_pct: 10.0
  ep_news_b_chg_open_min: 2.0
  ep_news_b_chg_open_max: 10.0
  ep_news_b_min_close_in_range: 30.0               # broader range: 30-80%
  ep_news_b_max_close_in_range: 80.0
  ep_news_b_max_downside_from_open: 6.0            # relaxed: < 6%
  # ep_news_b_prev_10d_max: -10.0                  # removed 2026-04-21 (see A)
  ep_news_b_atr_pct_min: 3.0
  ep_news_b_atr_pct_max: 7.0
  ep_news_b_max_volume_m: 5.0                      # volume < 5M shares
  # Strategy C (day-2 confirmation)
  ep_news_c_stop_loss_pct: 7.0                     # stop loss at -7% from entry
  # ep_news_c_prev_10d_max: -10.0                  # removed 2026-04-21 (see A)
  ep_news_c_atr_pct_min: 2.0                       # ATR% floor
  ep_news_c_atr_pct_max: 5.0                       # ATR% ceiling
  ep_news_c_max_hold_days: 20                      # shorter hold: 20 days (vs 50 for A/B)
  ep_news_c_day2_confirm: true                     # only enter if 1D return > 0

  # --- Breakout ---
  # Consolidation detection (nightly scan)
  breakout_consolidation_days_min: 10      # min trading days in consolidation range
  breakout_consolidation_days_max: 40      # max trading days in consolidation range
  consolidation_atr_ratio: 0.95            # ATR contraction threshold — recent/older ATR must be below this (lower = stricter, 1.0 = any contraction)
  consolidation_ma_tolerance_pct: 3.0      # max % distance from 10d/20d MA to count as "near"
  consolidation_prior_move_pct: 30.0       # min % advance (low→high) in ~2 months before consolidation
  # Entry signal
  breakout_volume_multiplier: 1.5          # min RVOL vs 20d avg (time-of-day normalized)
  breakout_max_extension_pct: 3.0         # max % above ORH before skipping (anti-chase guard)

  # --- Parabolic Short (disabled) ---
  parabolic_min_gain_pct: 50.0             # legacy fallback — used if per-cap keys not set
  parabolic_min_gain_pct_largecap: 50.0    # large-cap (price > $50): min gain % to qualify
  parabolic_min_gain_pct_smallcap: 200.0   # small-cap (price < $20): min gain % to qualify
  parabolic_min_days: 3                    # min consecutive up days

exits:
  partial_exit_after_days: 3              # sell partial after this many days in trade
  partial_exit_gain_threshold_pct: 15.0   # only partial exit if gain >= this %
  partial_exit_fraction: 0.40             # fraction of position to sell (40%)
  trailing_ma_period: 10                  # MA period for trailing stop (10 or 20)

telegram:
  bot_token: YOUR_TELEGRAM_BOT_TOKEN
  chat_id: YOUR_TELEGRAM_CHAT_ID   # single ID or comma-separated list (e.g. "111,222") to fan out

universe:
  min_price: 5.0
  min_avg_volume: 100000

database:
  url: sqlite:///trading_bot.db
