# Stage 1 exit sweep — EP News B, entries frozen at production.
# A wins on overlap: exclude_entry removes rows that also pass News A.
# Era: 2021-H2..2025. Small base (n~45). Path baseline PF is ~0.96 —
# News B may not survive at all; the sweep decides.
mode: path

entry_params:
  date_min: "2021-07-07"
  date_max: "2025-12-31"
  chg_open_min: 2.0
  chg_open_max: 10.0
  close_in_range_min: 30.0
  close_in_range_max: 80.0
  downside_from_open_max: 6.0
  atr_pct_min: 3.0
  atr_pct_max: 7.0
  volume_max: 5000000
  mktcap_b_min: 1.0

exclude_entry:
  chg_open_min: 2.0
  chg_open_max: 10.0
  close_in_range_min: 50.0
  downside_from_open_max: 3.0
  atr_pct_min: 3.0
  atr_pct_max: 7.0
  volume_max: 3000000
  mktcap_b_min: 1.0

exit_params:
  stop_pct: [6.0, 7.0, 8.0]
  profit_target_pct: [null, 6.0, 8.0, 10.0, 15.0, 20.0]
  profit_target_fraction: [0.33, 0.5]
  time_partial_day: [null, 10, 15, 19]
  time_partial_fraction: [0.40]
  time_partial_stop_mult: [1.05]
  breakeven_trigger_pct: [null, 5.0, 8.0, 12.0]
  breakeven_lock_pct: [0.0]
  max_hold_days: [30, 50]
