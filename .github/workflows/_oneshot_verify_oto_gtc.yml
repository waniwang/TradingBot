name: One-shot — verify OTO→GTC stop replacement

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Inline OTO/GTC verification on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          capture_stdout: true
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a

            echo '=== 1. Bot service journal — OTO/GTC log lines (today) ==='
            echo
            echo '--- Alpaca bot ---'
            journalctl -u trading-bot --since today --no-pager 2>/dev/null \
              | grep -E "OTO order placed|OTO child stop.*DAY-TIF|GTC stop placed|UNPROTECTED|cancel_order|Stop order placed" \
              | tail -80 || echo '(no matching log lines)'
            echo
            echo '--- IB bot ---'
            journalctl -u trading-bot-ib --since today --no-pager 2>/dev/null \
              | grep -E "OTO order placed|OTO child stop.*DAY-TIF|GTC stop placed|UNPROTECTED|Stop order placed" \
              | tail -80 || echo '(no matching log lines)'

            echo
            echo '=== 2. Today JobExecution: ep_*_execute on Alpaca DB ==='
            .venv/bin/python <<'PY'
            import sys
            from datetime import date
            from pathlib import Path
            ROOT = Path('/opt/trading-bot/trading-bot')
            sys.path.insert(0, str(ROOT))
            from db.models import JobExecution, Position, Order, get_session, init_db

            today = date.today()
            for label, url in [
                ('ALPACA', 'sqlite:////opt/trading-bot/trading-bot/trading_bot.db'),
                ('IB    ', 'sqlite:////opt/trading-bot/trading-bot/trading_bot_ib.db'),
            ]:
                eng = init_db(url) if 'trading_bot.db' in url else None
                if eng is None:
                    from sqlalchemy import create_engine
                    eng = create_engine(url)
                with get_session(eng) as s:
                    print(f'\n--- {label} JobExecution today (ep_*_execute) ---')
                    jobs = s.query(JobExecution).filter(
                        JobExecution.job_id.in_(['ep_earnings_execute', 'ep_news_execute']),
                        JobExecution.trade_date == today,
                    ).order_by(JobExecution.started_at).all()
                    for j in jobs:
                        st = j.started_at.strftime('%H:%M:%S') if j.started_at else '?'
                        print(f'  {st}  {j.job_id:22s} status={j.status:8s} {j.result_summary or "-"}')
                    if not jobs:
                        print('  (no execute jobs today)')

                    print(f'\n--- {label} Positions opened today ---')
                    positions = s.query(Position).filter(Position.opened_at >= today).all()
                    for p in positions:
                        print(f'  id={p.id:3d}  {p.ticker:6s}  setup={p.setup_type:18s}  '
                              f'shares={p.shares:5d}  entry=${p.entry_price:.2f}  '
                              f'stop=${p.stop_price:.2f}  stop_order_id={p.stop_order_id or "MISSING"}')
                    if not positions:
                        print('  (no positions opened today)')

                    print(f'\n--- {label} Orders created today ---')
                    orders = s.query(Order).filter(Order.created_at >= today).order_by(Order.created_at).all()
                    for o in orders:
                        ct = o.created_at.strftime('%H:%M:%S') if o.created_at else '?'
                        print(f'  {ct}  {o.ticker:6s}  side={o.side:11s}  type={o.order_type:6s}  '
                              f'qty={o.qty:5d}  status={o.status:18s}  broker_id={o.broker_order_id or "-"}')
                    if not orders:
                        print('  (no orders today)')
            PY

            echo
            echo '=== 3. Broker-side TIF check (Alpaca only) ==='
            .venv/bin/python <<'PY'
            import os, sys
            from datetime import date
            from pathlib import Path
            ROOT = Path('/opt/trading-bot/trading-bot')
            sys.path.insert(0, str(ROOT))
            from db.models import Position, get_session, init_db
            from alpaca.trading.client import TradingClient

            tc = TradingClient(
                api_key=os.environ['ALPACA_API_KEY'],
                secret_key=os.environ['ALPACA_SECRET_KEY'],
                paper=True,
            )
            eng = init_db('sqlite:////opt/trading-bot/trading-bot/trading_bot.db')
            today = date.today()
            with get_session(eng) as s:
                positions = s.query(Position).filter(Position.opened_at >= today, Position.is_open == True).all()
            print(f'Querying broker for {len(positions)} open positions opened today...')
            for p in positions:
                if not p.stop_order_id:
                    print(f'  {p.ticker:6s}  setup={p.setup_type:18s}  STOP_ORDER_ID MISSING')
                    continue
                try:
                    o = tc.get_order_by_id(p.stop_order_id)
                    tif = getattr(o, 'time_in_force', None)
                    tif_str = tif.value if hasattr(tif, 'value') else str(tif)
                    status = getattr(o, 'status', None)
                    status_str = status.value if hasattr(status, 'value') else str(status)
                    otype = getattr(o, 'order_type', None) or getattr(o, 'type', None)
                    otype_str = otype.value if hasattr(otype, 'value') else str(otype)
                    flag = 'OK-GTC' if tif_str.lower() == 'gtc' else f'BUG-{tif_str}'
                    print(f'  {p.ticker:6s}  setup={p.setup_type:18s}  type={otype_str:6s}  tif={tif_str:4s}  status={status_str:12s}  {flag}')
                except Exception as e:
                    print(f'  {p.ticker:6s}  ERROR querying broker: {e}')
            PY

            echo
            echo '=== 3b. Raw journal: any execution log line for today entries ==='
            for ticker in ROK WAT AMD CRI DVA; do
              echo "--- $ticker ---"
              journalctl -u trading-bot --since today --no-pager 2>/dev/null \
                | grep -E " $ticker(\b|:)" | tail -10 || echo "  (no journal lines)"
              echo
            done

            echo
            echo '=== 4. Verdict checklist ==='
            echo 'Look for in section 1 (Alpaca bot logs), per ticker:'
            echo '  ✓ "OTO order placed: ..."        — entry submitted'
            echo '  ✓ "OTO child stop ... DAY-TIF"   — fix detected the DAY child'
            echo '  ✓ "GTC stop placed for ..."      — replacement landed'
            echo '  ✗ "UNPROTECTED POSITION"         — should NOT appear'
            echo
            echo 'Look for in section 2:'
            echo '  ✓ Each Position has a stop_order_id (not MISSING)'
            echo '  ✓ Status of execute jobs = success'
