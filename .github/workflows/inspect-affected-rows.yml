name: Inspect 6 affected rows

# Inline diagnostic. Looks at the 6 tickers reported by classify_stale_rows
# as Order.filled w/ no Position, and prints the current state of every
# related row across Watchlist + Order + Position so we can see whether
# those Positions were silently created later (via reconcile, manual,
# or bot restart) or are still missing.

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inline state inspect on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a
            .venv/bin/python - <<'PY'
            import sys
            from pathlib import Path
            ROOT = Path("/opt/trading-bot/trading-bot")
            sys.path.insert(0, str(ROOT))
            import yaml
            from db.models import Order, Position, Watchlist, get_session, init_db

            with open(ROOT / "config.yaml") as f:
                cfg = yaml.safe_load(f)
            engine = init_db(cfg["database"]["url"])

            tickers = ["ARM", "MXL", "TXN", "URI", "WST", "GEV"]
            with get_session(engine) as s:
                for t in tickers:
                    print()
                    print("=" * 76)
                    print(f"  {t}")
                    print("=" * 76)
                    wls = s.query(Watchlist).filter(Watchlist.ticker == t).all()
                    print(f"Watchlist rows ({len(wls)}):")
                    for w in wls:
                        print(f"  id={w.id} setup={w.setup_type} stage={w.stage} "
                              f"scan_date={w.scan_date} added={w.added_at} updated={w.updated_at}")
                        if w.meta:
                            print(f"    meta={w.meta}")
                    orders = s.query(Order).filter(Order.ticker == t).order_by(Order.created_at).all()
                    print(f"Order rows ({len(orders)}):")
                    for o in orders:
                        print(f"  id={o.id} signal={o.signal_id} side={o.side} qty={o.qty} "
                              f"filled_qty={o.filled_qty} avg=${(o.filled_avg_price or 0):.2f} "
                              f"status={o.status} created={o.created_at}")
                    poss = s.query(Position).filter(Position.ticker == t).order_by(Position.opened_at).all()
                    print(f"Position rows ({len(poss)}):")
                    for p in poss:
                        print(f"  id={p.id} setup={p.setup_type} side={p.side} shares={p.shares} "
                              f"entry=${p.entry_price:.2f} stop=${p.stop_price:.2f} "
                              f"is_open={p.is_open} opened={p.opened_at} closed={p.closed_at} "
                              f"exit_reason={p.exit_reason} pnl={p.realized_pnl}")
            PY
