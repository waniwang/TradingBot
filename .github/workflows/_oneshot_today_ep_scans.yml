name: One-shot — diagnose today's EP scans (no candidates investigation)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostic on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a

            echo "================================================================"
            echo "PART 1: Failed ep_news_scan — full error trace"
            echo "================================================================"
            .venv/bin/python -c "
            import os, sys, yaml, pytz
            from datetime import datetime
            from pathlib import Path
            ROOT = Path('/opt/trading-bot/trading-bot')
            sys.path.insert(0, str(ROOT))
            from db.models import JobExecution, get_session, init_db
            ET = pytz.timezone('America/New_York')
            with open(ROOT / 'config.yaml') as f:
                cfg = yaml.safe_load(f)
            if os.environ.get('DATABASE_URL'):
                cfg['database']['url'] = os.environ['DATABASE_URL']
            engine = init_db(cfg['database']['url'])
            today = datetime.now(ET).date()
            with get_session(engine) as s:
                rows = s.query(JobExecution).filter(
                    JobExecution.trade_date == today,
                    JobExecution.job_id.in_(['ep_news_scan', 'ep_earnings_scan']),
                ).order_by(JobExecution.started_at).all()
                for r in rows:
                    print(f'=== {r.job_id} @ {r.started_at} status={r.status} ===')
                    print(f'  result_summary: {r.result_summary}')
                    print(f'  duration_seconds: {r.duration_seconds}')
                    print(f'  error:')
                    err = r.error or '(none)'
                    for line in err.split(chr(10)):
                        print(f'    {line}')
                    print()
            "

            echo ""
            echo "================================================================"
            echo "PART 2: trading_bot.log — EP scan windows"
            echo "================================================================"
            LOG=/opt/trading-bot/trading-bot/trading_bot.log
            echo "--- ep_earnings_scan window (15:00-15:04 ET) ---"
            grep -E "2026-05-13 15:0[0-3]" $LOG | tail -100 || true
            echo ""
            echo "--- ep_news_scan window (15:05-15:10 ET) ---"
            grep -E "2026-05-13 15:0[5-9]|2026-05-13 15:10" $LOG | tail -200 || true

            echo ""
            echo "================================================================"
            echo "PART 3: trading_bot.log — premarket preview window (8:30 AM ET)"
            echo "================================================================"
            grep -E "2026-05-13 08:3[0-4]" $LOG | grep -iE "premarket|preview|gapper" | tail -50 || true

            echo ""
            echo "================================================================"
            echo "PART 4: Available log files on server"
            echo "================================================================"
            ls -la /opt/trading-bot/trading-bot/*.log 2>/dev/null || echo "no .log files in trading-bot dir"
            ls -la /opt/trading-bot/trading-bot/logs/ 2>/dev/null || echo "no logs/ directory"
