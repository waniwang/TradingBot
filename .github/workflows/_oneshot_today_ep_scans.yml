name: One-shot — diagnose today's EP scans (no candidates investigation)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostic on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a

            echo "================================================================"
            echo "PART 1: JobExecution rows for EP scan/execute today"
            echo "================================================================"
            .venv/bin/python -c "
            import os, sys, yaml, pytz
            from datetime import datetime
            from pathlib import Path
            ROOT = Path('/opt/trading-bot/trading-bot')
            sys.path.insert(0, str(ROOT))
            from db.models import JobExecution, get_session, init_db
            ET = pytz.timezone('America/New_York')
            with open(ROOT / 'config.yaml') as f:
                cfg = yaml.safe_load(f)
            if os.environ.get('DATABASE_URL'):
                cfg['database']['url'] = os.environ['DATABASE_URL']
            engine = init_db(cfg['database']['url'])
            today = datetime.now(ET).date()
            with get_session(engine) as s:
                rows = s.query(JobExecution).filter(JobExecution.trade_date == today).order_by(JobExecution.started_at).all()
            print(f'=== {len(rows)} jobs on {today} ===')
            for r in rows:
                started = r.started_at.strftime('%H:%M:%S') if r.started_at else '?'
                if any(k in r.job_id for k in ['ep_', 'discord', 'premarket']):
                    print(f'  {started}  {r.job_id:40s}  {r.status:10s}')
                    print(f'      result: {r.result_summary or \"-\"}')
            "

            echo ""
            echo "================================================================"
            echo "PART 2: Watchlist rows from today (any stage)"
            echo "================================================================"
            .venv/bin/python -c "
            import os, sys, yaml, pytz, json
            from datetime import datetime
            from pathlib import Path
            ROOT = Path('/opt/trading-bot/trading-bot')
            sys.path.insert(0, str(ROOT))
            from db.models import Watchlist, get_session, init_db
            ET = pytz.timezone('America/New_York')
            with open(ROOT / 'config.yaml') as f:
                cfg = yaml.safe_load(f)
            if os.environ.get('DATABASE_URL'):
                cfg['database']['url'] = os.environ['DATABASE_URL']
            engine = init_db(cfg['database']['url'])
            today = datetime.now(ET).date()
            with get_session(engine) as s:
                rows = s.query(Watchlist).filter(Watchlist.scan_date == today).order_by(Watchlist.setup_type, Watchlist.ticker).all()
                print(f'=== {len(rows)} Watchlist rows with scan_date == {today} ===')
                for r in rows:
                    meta = r.meta or {}
                    ep_strat = meta.get('ep_strategy', '?')
                    notes = (r.notes or '')[:80]
                    print(f'  {r.ticker:6s}  setup={r.setup_type:20s}  stage={r.stage:12s}  ep_strat={ep_strat}  notes={notes}')
            "

            echo ""
            echo "================================================================"
            echo "PART 3: Journal log lines from EP scan windows (15:00 + 15:05 ET = 19:00 + 19:05 UTC)"
            echo "================================================================"
            # 15:00 ET → 19:00 UTC (Eastern Daylight Time in May)
            echo "--- ep_earnings_scan window (18:58-19:04 UTC) ---"
            journalctl -u trading-bot --since '2026-05-13 18:58:00' --until '2026-05-13 19:04:00' --no-pager | tail -200
            echo ""
            echo "--- ep_news_scan window (19:04-19:10 UTC) ---"
            journalctl -u trading-bot --since '2026-05-13 19:04:00' --until '2026-05-13 19:10:00' --no-pager | tail -200

            echo ""
            echo "================================================================"
            echo "PART 4: Pre-market preview (8:30 AM ET = 12:30 UTC) - did anything pre-qualify?"
            echo "================================================================"
            journalctl -u trading-bot --since '2026-05-13 12:28:00' --until '2026-05-13 12:35:00' --no-pager | grep -iE 'premarket|gapper|preview' | tail -100 || echo "  (no premarket preview log lines found)"
