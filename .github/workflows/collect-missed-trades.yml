name: Collect missed trades

# Nightly + on-demand: run scripts/collect_missed_trades.py on the server,
# capture the resulting CSV via stdout, and commit any changes to
# docs/missed_trades.csv. The committed file is the source of truth for the
# missed-trades tracker. A Google Sheet can sync from the raw GitHub URL via
# =IMPORTDATA() — no Google API credentials needed on our side.

on:
  workflow_dispatch:
  schedule:
    # 21:00 UTC daily ≈ 5:00 PM ET during DST / 4:00 PM ET in standard time.
    # Runs after EOD tasks (3:55 PM ET) so any same-day [bot-failure] rows are
    # already in the DB by the time we collect.
    - cron: '0 21 * * 1-5'

permissions:
  contents: write   # needed to commit the refreshed CSV back to main

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run collector and capture CSV via SSH
        id: collect
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          # capture_stdout streams everything the remote script prints back
          # to this step's stdout. We redirect only the cat output to stdout
          # and send the collector's logging to stderr so the captured stdout
          # is a clean CSV.
          capture_stdout: true
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a
            CSV_PATH=/tmp/missed_trades.csv
            .venv/bin/python scripts/collect_missed_trades.py \
              --output "$CSV_PATH" 1>&2
            # Print ONLY the CSV to stdout — the runner captures this and
            # writes it to docs/missed_trades.csv.
            cat "$CSV_PATH"

      - name: Write captured CSV to docs/missed_trades.csv
        run: |
          mkdir -p docs
          # ssh-action prefixes captured stdout with a header line; strip
          # anything before the first CSV header line ("date,failure_time,…").
          printf '%s' "${{ steps.collect.outputs.stdout }}" \
            | awk '/^date,failure_time,/{found=1} found' \
            > docs/missed_trades.csv
          echo "=== Preview ==="
          head -10 docs/missed_trades.csv
          echo "..."
          echo "Total rows: $(($(wc -l < docs/missed_trades.csv) - 1))"

      - name: Commit if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/missed_trades.csv 2>/dev/null && git ls-files --error-unmatch docs/missed_trades.csv > /dev/null 2>&1; then
            echo "No changes to docs/missed_trades.csv — nothing to commit"
            exit 0
          fi
          git add docs/missed_trades.csv
          if git diff --cached --quiet; then
            echo "Staged diff is empty — nothing to commit"
            exit 0
          fi
          git commit -m "chore(missed-trades): refresh tracker $(date -u +'%Y-%m-%d')"
          git push origin main
