name: IBKR bot — today's activity

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'ET date to inspect (YYYY-MM-DD). Blank = today.'
        required: false
        default: ''

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Run ib_today.py on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            # IB env file is in the same dir; load it for DATABASE_IB_URL.
            if [ -f config.ib.local.yaml ]; then
              export BOT_CONFIG=config.ib.local.yaml
            fi
            ARG=""
            if [ -n "${{ github.event.inputs.date }}" ]; then
              ARG="--date ${{ github.event.inputs.date }}"
            fi
            .venv/bin/python scripts/ib_today.py $ARG
