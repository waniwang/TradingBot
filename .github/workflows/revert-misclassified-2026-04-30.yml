name: Revert misclassified rows (2026-04-30)

# One-off remediation for the 2026-04-30 classify-stale-rows incident.
# See trading-bot/scripts/revert_misclassified_2026_04_30.py header.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Set to "true" to apply changes. Default is dry-run.'
        required: false
        default: 'false'

jobs:
  revert:
    runs-on: ubuntu-latest
    steps:
      - name: Run revert_misclassified_2026_04_30.py on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a
            FLAG=""
            if [ "${{ github.event.inputs.apply }}" = "true" ]; then
              FLAG="--yes"
            fi
            .venv/bin/python scripts/revert_misclassified_2026_04_30.py $FLAG
