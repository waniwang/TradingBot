name: IBKR source check (fresh vs stale)

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'ET date (YYYY-MM-DD). Blank = today.'
        required: false
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Run ib_source_check.py on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            ARG=""
            if [ -n "${{ github.event.inputs.date }}" ]; then
              ARG="--date ${{ github.event.inputs.date }}"
            fi
            DATABASE_IB_URL=sqlite:////opt/trading-bot/trading-bot/trading_bot_ib.db \
            WATCHLIST_SOURCE_DB_URL=sqlite:////opt/trading-bot/trading-bot/trading_bot.db \
              .venv/bin/python scripts/ib_source_check.py $ARG
