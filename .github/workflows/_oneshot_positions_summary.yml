name: One-shot — open positions summary (both bots)

on:
  workflow_dispatch:

jobs:
  positions:
    runs-on: ubuntu-latest
    steps:
      - name: Pull open positions with current price + gain %
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          capture_stdout: true
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a
            .venv/bin/python <<'PY'
            import os, sys
            from datetime import datetime, date
            from pathlib import Path
            ROOT = Path('/opt/trading-bot/trading-bot')
            sys.path.insert(0, str(ROOT))
            from sqlalchemy import create_engine
            from sqlalchemy.orm import sessionmaker
            from db.models import Position, init_db, get_session

            # Use Alpaca's market data API for current prices (works for any
            # US equity ticker — both bots trade the same names).
            from alpaca.data.historical import StockHistoricalDataClient
            from alpaca.data.requests import StockLatestTradeRequest

            data_client = StockHistoricalDataClient(
                api_key=os.environ['ALPACA_API_KEY'],
                secret_key=os.environ['ALPACA_SECRET_KEY'],
            )

            today = date.today()

            def fetch_prices(tickers):
                if not tickers:
                    return {}
                try:
                    req = StockLatestTradeRequest(symbol_or_symbols=list(tickers))
                    trades = data_client.get_stock_latest_trade(req)
                    return {t: float(trades[t].price) for t in trades}
                except Exception as e:
                    print(f'  WARN: latest_trade fetch failed: {e}')
                    return {}

            for label, url in [
                ('ALPACA', 'sqlite:////opt/trading-bot/trading-bot/trading_bot.db'),
                ('IB    ', 'sqlite:////opt/trading-bot/trading-bot/trading_bot_ib.db'),
            ]:
                if 'trading_bot.db' in url:
                    eng = init_db(url)
                else:
                    eng = create_engine(url)
                S = sessionmaker(bind=eng)
                with S() as s:
                    positions = (
                        s.query(Position)
                        .filter(Position.is_open == True)
                        .order_by(Position.opened_at.asc())
                        .all()
                    )

                tickers = sorted({p.ticker for p in positions})
                prices = fetch_prices(tickers)

                print(f'\n=== {label} ({len(positions)} open positions) ===')
                print(f'{"#":>2}  {"ticker":<7s}  {"setup":<18s}  '
                      f'{"shares":>6s}  {"entry":>10s}  {"current":>10s}  '
                      f'{"stop":>10s}  {"days":>4s}  {"gain%":>8s}  {"P&L $":>10s}')
                print('-' * 110)

                total_pnl = 0.0
                total_cost = 0.0
                for i, p in enumerate(positions, 1):
                    cur = prices.get(p.ticker)
                    days = (today - p.opened_at.date()).days if p.opened_at else 0
                    if cur is not None and p.entry_price:
                        gain_pct = (cur - p.entry_price) / p.entry_price * 100
                        pnl = (cur - p.entry_price) * p.shares
                    else:
                        gain_pct = float('nan')
                        pnl = float('nan')
                    cost = (p.entry_price or 0) * p.shares
                    if cur is not None:
                        total_pnl += pnl
                        total_cost += cost
                    cur_s = f'${cur:.2f}' if cur is not None else 'N/A'
                    pnl_s = f'${pnl:+,.0f}' if cur is not None else 'N/A'
                    gain_s = f'{gain_pct:+.2f}%' if cur is not None else 'N/A'
                    print(f'{i:>2}  {p.ticker:<7s}  {p.setup_type:<18s}  '
                          f'{p.shares:>6d}  ${p.entry_price:>9.2f}  {cur_s:>10s}  '
                          f'${p.stop_price:>9.2f}  {days:>4d}  {gain_s:>8s}  {pnl_s:>10s}')

                if total_cost > 0:
                    print('-' * 110)
                    print(f'  Total cost basis: ${total_cost:>10,.0f}    '
                          f'Unrealized P&L: ${total_pnl:+,.0f}    '
                          f'Aggregate gain: {(total_pnl/total_cost*100):+.2f}%')
            PY
