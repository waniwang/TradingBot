name: Pending day-2 candidates

# Manual trigger: list every Strategy C candidate currently in stage="watching"
# from the chosen scan_date, with a live "would confirm at 3:45 PM?" preview.

on:
  workflow_dispatch:
    inputs:
      scan_date:
        description: 'Gap-day ET date (YYYY-MM-DD). Blank = yesterday.'
        required: false
        default: ''

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Run pending_day2_candidates.py on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a
            ARG=""
            if [ -n "${{ github.event.inputs.scan_date }}" ]; then
              ARG="--scan-date ${{ github.event.inputs.scan_date }}"
            fi
            .venv/bin/python scripts/pending_day2_candidates.py $ARG
