name: One-shot — IB bot scheduler + 9:40 job check
on:
  workflow_dispatch:
jobs:
  ib_check:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect IB bot service + scheduler
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          script: |
            echo "=== IB bot systemd status ==="
            systemctl status trading-bot-ib --no-pager 2>&1 | head -20
            echo ""
            echo "=== Last 20 lines of IB bot log around 9:40 ET (14:40 UTC) ==="
            journalctl -u trading-bot-ib --since "2026-05-13 14:39:00" --until "2026-05-13 14:42:00" --no-pager 2>&1 | tail -50
            echo ""
            echo "=== Search IB log for ep_time_partial registration (today) ==="
            journalctl -u trading-bot-ib --since "2026-05-13 00:00:00" --no-pager 2>&1 | grep -iE "ep_time_partial|scheduler|added job|cron" | head -30
            echo ""
            echo "=== JobExecution rows from IB DB (today) ==="
            cd /opt/trading-bot/trading-bot
            .venv/bin/python -c "
            import sys; sys.path.insert(0, '/opt/trading-bot/trading-bot')
            from sqlalchemy import create_engine
            from sqlalchemy.orm import sessionmaker
            from db.models import JobExecution
            from datetime import date, datetime
            eng = create_engine('sqlite:////opt/trading-bot/trading-bot/trading_bot_ib.db')
            S = sessionmaker(bind=eng)
            with S() as s:
                rows = s.query(JobExecution).filter(
                    JobExecution.started_at >= datetime.combine(date.today(), datetime.min.time())
                ).order_by(JobExecution.started_at).all()
                print(f'  {len(rows)} jobs today on IB:')
                for j in rows:
                    started = j.started_at.strftime('%H:%M:%S') if j.started_at else '?'
                    print(f'    {started}  {j.job_id:<28s}  {j.status:<10s}  {j.result_summary or \"-\"}')
            "
            echo ""
            echo "=== Last successful deploy commit on server ==="
            cd /opt/trading-bot && git -C trading-bot log -3 --oneline 2>&1
