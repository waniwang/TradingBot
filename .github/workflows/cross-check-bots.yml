name: Cross-check Alpaca vs IBKR

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'ET date (YYYY-MM-DD). Blank = today.'
        required: false
        default: ''

jobs:
  cross_check:
    runs-on: ubuntu-latest
    steps:
      - name: Run cross_check_bots.py on Linode
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a
            ARG=""
            if [ -n "${{ github.event.inputs.date }}" ]; then
              ARG="--date ${{ github.event.inputs.date }}"
            fi
            DATABASE_IB_URL=sqlite:////opt/trading-bot/trading-bot/trading_bot_ib.db \
              .venv/bin/python scripts/cross_check_bots.py $ARG
