name: One-shot — close remaining Alpaca dropped-variant positions

on:
  workflow_dispatch:

jobs:
  close_alpaca:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose cancel state + attempt close via /v2/positions endpoint
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          capture_stdout: true
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a
            .venv/bin/python <<'PY'
            """
            Step 1: query each dropped-variant position's stop_order_id status
                    — confirms whether our prior cancel actually went through.
            Step 2: try Alpaca's TradingClient.close_position(symbol, qty=N)
                    which hits /v2/positions endpoint and handles related stops
                    server-side (different from MarketOrderRequest path).
            """
            import os, sys, time
            from datetime import datetime
            from pathlib import Path

            ROOT = Path("/opt/trading-bot/trading-bot")
            sys.path.insert(0, str(ROOT))

            from sqlalchemy.orm import sessionmaker
            from db.models import Position, init_db
            from alpaca.trading.client import TradingClient
            from alpaca.trading.requests import ClosePositionRequest
            from alpaca.data.historical import StockHistoricalDataClient
            from alpaca.data.requests import StockLatestTradeRequest

            tc = TradingClient(
                api_key=os.environ["ALPACA_API_KEY"],
                secret_key=os.environ["ALPACA_SECRET_KEY"],
                paper=True,
            )
            data_client = StockHistoricalDataClient(
                api_key=os.environ["ALPACA_API_KEY"],
                secret_key=os.environ["ALPACA_SECRET_KEY"],
            )

            REMAINING = [
                ("DVA",  "ep_earnings_c"),
                ("PRG",  "ep_news_c"),
                ("PI",   "ep_earnings_c"),
                ("BRKR", "ep_earnings_c"),
                ("FSS",  "ep_news_c"),
                ("ROK",  "ep_earnings_c"),
                ("FLYW", "ep_earnings_c"),
                ("ULCC", "ep_earnings_c"),
                ("LTM",  "ep_earnings_c"),
                ("ICL",  "ep_news_c"),
            ]

            ALPACA_DB = "sqlite:////opt/trading-bot/trading-bot/trading_bot.db"
            eng = init_db(ALPACA_DB)
            S = sessionmaker(bind=eng)

            print("=== STEP 1: cancel state of each variant's stop_order_id ===\n")
            order_states: dict[str, str] = {}
            with S() as session:
                for ticker, setup_type in REMAINING:
                    pos = session.query(Position).filter_by(
                        ticker=ticker, setup_type=setup_type, is_open=True
                    ).first()
                    if pos is None:
                        print(f"  {ticker} ({setup_type}): no open position (may already be closed)")
                        continue
                    if not pos.stop_order_id:
                        print(f"  {ticker} ({setup_type}): no stop_order_id on Position")
                        order_states[ticker] = "no-stop-id"
                        continue
                    try:
                        order = tc.get_order_by_id(pos.stop_order_id)
                        status = order.status.value if hasattr(order.status, 'value') else str(order.status)
                        print(f"  {ticker} ({setup_type}): stop_order={pos.stop_order_id[:8]} status={status}")
                        order_states[ticker] = status
                    except Exception as e:
                        print(f"  {ticker} ({setup_type}): get_order failed: {e}")
                        order_states[ticker] = f"error:{e}"

            print("\n=== STEP 2: try TradingClient.close_position(symbol, qty=N) ===\n")
            print("(this hits /v2/positions/{symbol} DELETE which Alpaca's server")
            print(" handles atomically with any open orders against the position)\n")

            with S() as session:
                for ticker, setup_type in REMAINING:
                    pos = session.query(Position).filter_by(
                        ticker=ticker, setup_type=setup_type, is_open=True
                    ).first()
                    if pos is None:
                        continue
                    qty = pos.shares - pos.partial_exit_shares

                    # First, cancel ALL open orders for this ticker via Alpaca's
                    # cancel-orders-for-symbol pattern (simpler than our targeted
                    # cancel because it ensures everything is released).
                    # Note: this could cancel BOTH stops if a ticker has both A and C.
                    # For DVA that means we'll lose A's stop too — but DVA-A is in
                    # our keepers list so we'll need to recreate that stop after.
                    try:
                        # alpaca-py exposes cancel_order_by_id but not cancel-by-symbol.
                        # Loop the open orders and cancel any that match this symbol.
                        from alpaca.trading.requests import GetOrdersRequest
                        from alpaca.trading.enums import QueryOrderStatus
                        open_orders = tc.get_orders(GetOrdersRequest(
                            status=QueryOrderStatus.OPEN, symbols=[ticker]
                        ))
                        for o in open_orders:
                            try:
                                tc.cancel_order_by_id(o.id)
                                print(f"  {ticker}: cancelled open order {str(o.id)[:8]} ({o.order_type}, status={o.status})")
                            except Exception as e:
                                print(f"  {ticker}: cancel of {str(o.id)[:8]} failed: {e}")
                    except Exception as e:
                        print(f"  {ticker}: get_orders failed: {e}")

                    # Wait for cancels to propagate
                    time.sleep(3.0)

                    # Now use Alpaca's exit-position endpoint
                    try:
                        order = tc.close_position(
                            ticker, ClosePositionRequest(qty=str(qty))
                        )
                        print(f"  {ticker} ({setup_type}): CLOSED via /v2/positions endpoint, "
                              f"order_id={str(order.id)[:8]}")

                        # Update DB
                        try:
                            req = StockLatestTradeRequest(symbol_or_symbols=[ticker])
                            trades = data_client.get_stock_latest_trade(req)
                            current_price = float(trades[ticker].price) if ticker in trades else pos.entry_price
                        except Exception:
                            current_price = pos.entry_price
                        if pos.side == "long":
                            pnl = qty * (current_price - pos.entry_price)
                        else:
                            pnl = qty * (pos.entry_price - current_price)
                        pos.exit_price = current_price
                        pos.exit_reason = "manual"
                        pos.realized_pnl = pnl
                        pos.is_open = False
                        pos.closed_at = datetime.utcnow()
                        session.commit()
                        print(f"    → DB updated: pnl=${pnl:+,.2f}")
                    except Exception as e:
                        print(f"  {ticker} ({setup_type}): close_position FAILED: {e}")

            print("\nDONE.")
            PY
