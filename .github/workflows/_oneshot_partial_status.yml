name: One-shot — today's job history + EP partial status

on:
  workflow_dispatch:

jobs:
  partial_status:
    runs-on: ubuntu-latest
    steps:
      - name: Pull today's JobExecution rows + current positions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          capture_stdout: true
          command_timeout: 2m
          script: |
            set -e
            cd /opt/trading-bot/trading-bot
            set -a && source .env && set +a
            timeout 90 .venv/bin/python <<'PY'
            import os, sys
            from datetime import datetime, date, timedelta
            from pathlib import Path
            ROOT = Path("/opt/trading-bot/trading-bot")
            sys.path.insert(0, str(ROOT))

            from sqlalchemy import create_engine
            from sqlalchemy.orm import sessionmaker
            from db.models import JobExecution, Position, init_db

            today = date.today()

            for label, url in [
                ("ALPACA", "sqlite:////opt/trading-bot/trading-bot/trading_bot.db"),
                ("IB    ", "sqlite:////opt/trading-bot/trading-bot/trading_bot_ib.db"),
            ]:
                eng = init_db(url) if "trading_bot.db" in url and "_ib" not in url else create_engine(url)
                S = sessionmaker(bind=eng)

                print(f"\n{'='*78}")
                print(f"{label} bot — today's JobExecution log")
                print('=' * 78)
                with S() as session:
                    rows = (
                        session.query(JobExecution)
                        .filter(JobExecution.started_at >= datetime.combine(today, datetime.min.time()))
                        .order_by(JobExecution.started_at.asc())
                        .all()
                    )
                    if not rows:
                        print("  (no jobs run today)")
                    for j in rows:
                        start = j.started_at.strftime("%H:%M:%S")
                        dur = (j.finished_at - j.started_at).total_seconds() if j.finished_at else None
                        dur_s = f"{dur:.1f}s" if dur is not None else "running"
                        summary = (j.result_summary or "")[:80]
                        print(f"  {start} {j.status:<10s} {j.job_id:<28s} {dur_s:>8s}  {summary}")

                print(f"\n{label} bot — open EP positions (partial state)")
                print('-' * 78)
                with S() as session:
                    positions = (
                        session.query(Position)
                        .filter(Position.is_open == True)
                        .filter(Position.setup_type.like("ep_%"))
                        .order_by(Position.opened_at.asc())
                        .all()
                    )
                    if not positions:
                        print("  (no open EP positions)")
                    for p in positions:
                        days_held = (datetime.utcnow() - p.opened_at).days
                        partial = "yes" if p.partial_exit_done else "NO"
                        pe_shares = p.partial_exit_shares or 0
                        pe_price = p.partial_exit_price or 0
                        stop_at = f"${p.stop_price:.2f}" if p.stop_price else "no_stop"
                        partial_info = (
                            f"partial={partial}"
                            + (f" {pe_shares}sh@${pe_price:.2f}" if p.partial_exit_done else "")
                        )
                        eligible = (
                            days_held >= 19 and not p.partial_exit_done
                            and not p.partial_exit_order_id
                        )
                        elig_mark = " ⭐" if eligible else ""
                        print(f"  {p.ticker:<6s} {p.setup_type:<18s}  d{days_held:>2d}  "
                              f"entry=${p.entry_price:>8.2f}  stop={stop_at:<8s}  "
                              f"{partial_info}{elig_mark}")
            PY
